<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UpSkillX — Page Not Found</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    .error-code {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="not-found">
    <div>
      <div class="error-code">404</div>
      <h2 style="font-size:1.5rem; margin-bottom:12px;">Page Not Found</h2>
      <p style="color:var(--text-2); margin-bottom:32px;">Looks like this lesson doesn't exist yet.<br>Head back and keep learning!</p>
      <div style="display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
        <a href="/" class="btn btn-primary btn-lg">🏠 Go Home</a>
        <a href="/pages/dashboard.html" class="btn btn-secondary btn-lg">📚 Dashboard</a>
      </div>
    </div>
  </div>
  <script>
    const t = localStorage.getItem('upskillx-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</body>
</html>
