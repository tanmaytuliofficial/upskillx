<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UpSkillX — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
      position: relative;
      z-index: 1;
    }
    .auth-container {
      width: 100%;
      max-width: 440px;
    }
    .auth-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-brand .logo {
      font-family: 'Clash Display', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      margin-bottom: 6px;
    }
    .auth-brand p { color: var(--text-2); font-size: 0.95rem; }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 36px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: scale-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .auth-tabs {
      display: flex;
      background: var(--input-bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-2);
      transition: all 0.25s;
    }
    .auth-tab.active { background: var(--brand); color: white; }
    .divider-text {
      text-align: center;
      color: var(--text-3);
      font-size: 0.85rem;
      margin: 20px 0;
      position: relative;
    }
    .divider-text::before, .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 24px);
      height: 1px;
      background: var(--border);
    }
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-2); }
    .auth-footer a { color: var(--brand); font-weight: 600; }
    .field-error { color: #FF6B6B; font-size: 0.8rem; margin-top: 4px; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 48px; }
    .password-toggle {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-3);
      font-size: 1.1rem;
      user-select: none;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-2);
      font-size: 0.88rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--brand); }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- Minimal Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">⚡UpSkillX</a>
    <div class="navbar-spacer"></div>
    <button class="theme-toggle" id="themeToggle"></button>
  </nav>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-brand">
        <span class="logo">⚡UpSkillX</span>
        <p>Your gateway to expert-led learning</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab" id="loginTab">Log In</div>
          <div class="auth-tab" id="signupTab">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
          <button class="btn btn-google w-full" id="googleLoginBtn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
          <div class="divider-text">or</div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" id="loginPass" placeholder="Your password" />
              <span class="password-toggle" id="toggleLoginPass">👁</span>
            </div>
          </div>
          <p class="field-error" id="loginError"></p>
          <button class="btn btn-primary w-full" id="emailLoginBtn" style="margin-top: 8px;">Log In →</button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" style="display:none;">
          <button class="btn btn-google w-full" id="googleSignupBtn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Sign Up with Google
          </button>
          <div class="divider-text">or</div>
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Tanmay Tuli" />
          </div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" id="signupPass" placeholder="Min 6 characters" />
              <span class="password-toggle" id="toggleSignupPass">👁</span>
            </div>
          </div>
          <p class="field-error" id="signupError"></p>
          <button class="btn btn-primary w-full" id="emailSignupBtn" style="margin-top: 8px;">Create Account →</button>
        </div>
      </div>

      <div class="auth-footer">
        <a href="/">← Back to homepage</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    // Theme
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('upskillx-theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const t = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', t);
      localStorage.setItem('upskillx-theme', t);
    });

    // URL mode check
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');

    // Tab switching
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    function showLogin() {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.style.display = '';
      signupForm.style.display = 'none';
    }
    function showSignup() {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.style.display = '';
      loginForm.style.display = 'none';
    }

    if (mode === 'signup') showSignup(); else showLogin();

    loginTab.addEventListener('click', showLogin);
    signupTab.addEventListener('click', showSignup);

    // Password toggles
    function setupToggle(inputId, toggleId) {
      document.getElementById(toggleId).addEventListener('click', () => {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    }
    setupToggle('loginPass', 'toggleLoginPass');
    setupToggle('signupPass', 'toggleSignupPass');

    // Toast
    function toast(msg, type='info') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${msg}`;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    // Firebase Auth
    import { auth, db, googleProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, doc, setDoc, getDoc, serverTimestamp } from '/js/firebase-config.js';

    async function saveUserToFirestore(user, extraName = null) {
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          uid: user.uid,
          name: extraName || user.displayName || 'Learner',
          email: user.email,
          joinDate: serverTimestamp(),
          enrolledCourses: [],
          xp: 0,
          streak: 0,
          lastActive: serverTimestamp()
        });
      }
    }

    async function handleGoogleAuth() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        await saveUserToFirestore(result.user);
        toast('Welcome! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/pages/dashboard.html', 1000);
      } catch(e) {
        toast(e.message, 'error');
      }
    }

    document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleAuth);
    document.getElementById('googleSignupBtn').addEventListener('click', handleGoogleAuth);

    // Email Login
    document.getElementById('emailLoginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      if (!email || !pass) { errEl.textContent = 'Please fill all fields.'; return; }
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        toast('Welcome back!', 'success');
        setTimeout(() => window.location.href = '/pages/dashboard.html', 1000);
      } catch(e) {
        errEl.textContent = e.code === 'auth/invalid-credential' ? 'Invalid email or password.' : e.message;
      }
    });

    // Email Signup
    document.getElementById('emailSignupBtn').addEventListener('click', async () => {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass = document.getElementById('signupPass').value;
      const errEl = document.getElementById('signupError');
      errEl.textContent = '';
      if (!name || !email || !pass) { errEl.textContent = 'Please fill all fields.'; return; }
      if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        await saveUserToFirestore(cred.user, name);
        toast('Account created! Welcome to UpSkillX!', 'success');
        setTimeout(() => window.location.href = '/pages/dashboard.html', 1200);
      } catch(e) {
        errEl.textContent = e.code === 'auth/email-already-in-use' ? 'Email already in use. Try logging in.' : e.message;
      }
    });
  </script>
</body>
</html>
